<section class="settings">


  <div id="parent">
    <div class="main-contents">


      <div class="kintoneplugin-title">対象ルックアップフィールド</div>
      <div class="lookup-container">
        <select class="look-up select2"></select>
      </div>


      <div class="copy-contents" style="margin:10px 0 25px 0;">

        <div class="kintoneplugin-title" style="width: 400px;">コピーフィールド(右のコピー元を先に選択)</div>


        <div class="copy-contents-row" style="display: flex;">

          <div class="left-container" style="width: 320px;">
            <select class="destination-field select2"></select>
          </div>

          <div style="margin: 0 10px;width: 60px; display: inline-block;">
            <p class="arrow">←</p>
          </div>

          <div class="right-container" style="width: 295px;">
            <select class="source-field select2"></select>
          </div>


          <!-- 追加・削除ボタン -->
          <div class="kintoneplugin-table-td-operation" style="z-index: 1;">
            <button type="button" class="kintoneplugin-button-add-row-image add-child-row" title="Add row"></button>
            <button type="button" class="kintoneplugin-button-remove-row-image remove-child-row"
              title="Delete this row"></button>
          </div>

        </div>
      </div>

      <p style="color:#333;margin-top: 10px;"><input type="checkbox" class="table-check" style="margin-left:5px;">サブテーブルのみ表示</p>


    </div>
  </div>

  <p class="kintoneplugin-row">
    <button type="button" class="js-cancel-button kintoneplugin-button-dialog-cancel">キャンセル</button>
    <button id="submit" class="kintoneplugin-button-dialog-ok">保存</button>
  </p>
</section>
