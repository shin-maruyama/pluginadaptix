<section class="settings">
  <form class="js-submit-settings">

    <div id="parent">
      <div class="main-contents">

        <p style="color:#333;margin-top: 10px;">指定日フィールド <span style="color: red;">※</span></p>
        <div class="tip-container">
            <select class="date-select select2">
              <!-- <option value="none"></option> -->
            </select>
        </div>

        <p style="color:#333;margin-top: 10px;">（年）格納フィールド</p>
        <div class="tip-container">
          <select class="year-select select2">
            <!-- <option value="none"></option> -->
          </select>
        </div>

        <p style="color:#333;margin-top: 10px;">（月）格納フィールド</p>
        <div class="tip-container">
          <select class="month-select select2">
            <!-- <option value="none" ></option> -->
          </select>
        </div>

        <p style="color:#333;margin-top: 10px;">（日）格納フィールド</p>
        <div class="tip-container">
          <select class="day-select select2">
            <!-- <option value="none"></option> -->
          </select>
        </div>

        <!-- 追加・削除ボタン -->
        <div class="kintoneplugin-table-td-operation" style="margin-left: -10px;">
          <button type="button" class="kintoneplugin-button-add-row-image add-row" title="Add row"></button>
          <button type="button" class="kintoneplugin-button-remove-row-image remove-row" title="Delete this row"></button>
        </div>

      </div>
    </div>

    <p class="kintoneplugin-row">
        <button type="button" class="js-cancel-button kintoneplugin-button-dialog-cancel">キャンセル</button>
        <button id="submit" class="kintoneplugin-button-dialog-ok">保存</button>
    </p>
  </form>
</section>
