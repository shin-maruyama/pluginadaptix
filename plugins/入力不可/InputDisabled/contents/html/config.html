<section class="settings">
  <div style="height: 100px; width: 200px;">
    <p>編集不可の背景色</p>
    <div class="kintoneplugin-select-outer">
      <div class="kintoneplugin-select">
        <select id="color">
          <option value="#d4d7d7">デフォルト</option>
          <option value="#F78181">赤</option>
          <option value="#A9F5D0">緑</option>
          <option value="#A9E2F3">青</option>
          <option value="#fff">白</option>
        </select>
      </div>
    </div>
  </div>
  <p class="kintoneplugin-desc">フィールドを選択してください。</p>
  <form class="js-submit-settings">
    <p class="kintoneplugin-row">

      <div id="kintoneplugin-select">
        <table id="table" class="table">
          <tbody id="tbody"  class="tbody">
            <tr class="tr"> 
              <td>
                <select class="selectA select2" id="selectA">
                  <option value="選択">ーーー</option>
                </select>
              </td>
              <td class="kintoneplugin-table-td-operation">
                <button type="button" class="kintoneplugin-button-add-row-image" title="Add row"></button>
                <button type="button" class="kintoneplugin-button-remove-row-image" title="Delete this row"></button>
              </td>
            </tr> 
          </tbody>
        </table>
      </div>
    </p>
  </form>
</section>

<p class="kintoneplugin-row">
  <button type="button" class="js-cancel-button kintoneplugin-button-dialog-cancel">キャンセル</button>
  <button class="kintoneplugin-button-dialog-ok">保存</button>
</p>
