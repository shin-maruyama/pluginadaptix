<section class="settings">


  <div id="parent">
    <div class="main-contents">

      <p style="color:#333">区切り文字</p>
      <div class="kintoneplugin-input-outer">
        <input class="kintoneplugin-input-text delimiter" type="text" placeholder="区切り文字" style="width:290px;height: 55px;">
      </div>

      <p style="color:#333;">反映元フィールド</p>
      <div class="container">
        <select class="source-select select2"></select>
      </div>

      <p style="color:#333;">反映先フィールド</p>
      <div class="container">
        <select class="destination-select select2"></select>
      </div>


      <!-- 追加・削除ボタン -->
      <div class="kintoneplugin-table-td-operation" style="margin-left: -15px;">
        <button type="button" class="kintoneplugin-button-add-row-image add-row" title="Add row"></button>
        <button type="button" class="kintoneplugin-button-remove-row-image remove-row" title="Delete this row"></button>
      </div>

    </div>
  </div>

  <p class="kintoneplugin-row">
    <button id="cancel" class="js-cancel-button kintoneplugin-button-dialog-cancel">キャンセル</button>
    <button id="submit" class="kintoneplugin-button-dialog-ok">保存</button>
  </p>
</section>
