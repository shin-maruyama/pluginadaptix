<section class="settings">
  <form class="js-submit-settings">
    <div id="parent">
      <div class="main-contents">

        <p style="color:#333">制限フィールド</p>
        <div class="container">
          <select id="characters-select" class="characters-select select2">
            <!-- <option value=""></option> -->
          </select>
        </div>
        <div style="display: flex;">
          <div class="left-column">
            <p style="color:#333">制限文字（許可）</p>
            <div class="kintoneplugin-input-checkbox">
              <span class="kintoneplugin-input-checkbox-item">
                <input type="checkbox" name="checkbox" id="checkbox-0">
                <label for="checkbox-0">ひらがな</label>
              </span>
            </div>
            <div class="kintoneplugin-input-checkbox">
              <span class="kintoneplugin-input-checkbox-item">
                <input type="checkbox" name="checkbox" id="checkbox-1">
                <label for="checkbox-1">カタカナ</label>
              </span>
            </div>
            <div class="kintoneplugin-input-checkbox">
              <span class="kintoneplugin-input-checkbox-item">
                <input type="checkbox" name="checkbox" id="checkbox-2">
                <label for="checkbox-2">数字</label>
              </span>
            </div>
            <div class="kintoneplugin-input-checkbox">
              <span class="kintoneplugin-input-checkbox-item">
                <input type="checkbox" name="checkbox" id="checkbox-3">
                <label for="checkbox-3">英字</label>
              </span>
            </div>
            <div class="kintoneplugin-input-checkbox">
              <span class="kintoneplugin-input-checkbox-item">
                <input type="checkbox" name="checkbox" id="checkbox-4">
                <label for="checkbox-4">記号</label>
              </span>
            </div>
            <div class="kintoneplugin-input-outer">
              <p>記号の種類</p>
              <input class="kintoneplugin-input-text" type="text" value="\/*+.,!?#$%&~|^@;:()[]{}">
            </div>
            <div>
              <input class="initialization-button" type="button" value="初期化">
            </div>
            <div class="kintoneplugin-table-td-operation">
              <button type="button" class="kintoneplugin-button-add-row-image" title="Add row"></button>
              <button type="button" class="kintoneplugin-button-remove-row-image" title="Delete this row"></button>
            </div>

          </div>

          <div class="kintoneplugin-input-radio-container">
            <div class="kintoneplugin-input-radio">
              <p>全角/半角変換（カナ・数字・英字）</p>
              <span class="kintoneplugin-input-radio-item">
                <input type="radio" name="radiokaku" id="radiokaku-0" checked="">
                <label for="radiokaku-0">全角</label>
              </span>
              <span class="kintoneplugin-input-radio-item">
                <input type="radio" name="radiokaku" id="radiokaku-1">
                <label for="radiokaku-1">半角</label>
              </span>
              <span class="kintoneplugin-input-radio-item">
                <input type="radio" name="radiokaku" id="radiokaku-2">
                <label for="radiokaku-2">しない</label>
              </span>
            </div>

            <div class="kintoneplugin-input-radio">
              <p>大文字/小文字変換（英字）</p>
              <span class="kintoneplugin-input-radio-item">
                <input type="radio" name="radiomoji" id="radiomoji-0" checked="">
                <label for="radiomoji-0">大文字</label>
              </span>
              <span class="kintoneplugin-input-radio-item">
                <input type="radio" name="radiomoji" id="radiomoji-1">
                <label for="radiomoji-1">小文字</label>
              </span>
              <span class="kintoneplugin-input-radio-item">
                <input type="radio" name="radiomoji" id="radiomoji-2">
                <label for="radiomoji-2">しない</label>
              </span>
            </div>
          </div>

        </div>
      </div>

    </div>

    <p class="kintoneplugin-row">
      <button type="button" class="js-cancel-button kintoneplugin-button-dialog-cancel">キャンセル</button>
      <button class="kintoneplugin-button-dialog-ok">保存</button>
    </p>
  </form>
</section>
