<section class="settings">
  <form class="js-submit-settings">
    
    <table class="kintoneplugin-table">
      <thead style="color: #333; size: 16px; font-family: 'メイリオ', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;">
        <tr>
          <th style="padding: 0px 16px;font-weight:normal">テーブルフィールド</th>
          <th style="padding: 0px 16px;font-weight:normal">最大行数(半角数字)</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr class="tr">
          <td>
            <select class="sub-table-select select2">
            </select>
          </td>
          <td>
            <div class="kintoneplugin-input-outer" style="width:290px;height:55px">
              <input id="maxNumberOfRows" class="kintoneplugin-input-text" style="width:290px;height:55px;background-color:#f7f9fa;">
            </div>
          </td>
          <td class="kintoneplugin-table-td-operation" style="vertical-align: bottom;">
            <button type="button" class="kintoneplugin-button-add-row-image" title="Add row"></button>
            <button type="button" class="kintoneplugin-button-remove-row-image" title="Delete this row"></button>
          </td>
        </tr>
      </tbody>
    </table>

  </form>
</section>

<p class="kintoneplugin-row">
  <button type="button" class="js-cancel-button kintoneplugin-button-dialog-cancel">キャンセル</button>
  <button class="kintoneplugin-button-dialog-ok" id="submit">保存</button>
</p>
