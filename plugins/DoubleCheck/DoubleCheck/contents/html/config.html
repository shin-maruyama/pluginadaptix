<section class="settings">
  <form class="js-submit-settings">

    <!--<h1>重複禁止フィールド</h1>-->
    <div id="parent">

      <div style="margin-left:-30px;margin-bottom:15px;display:flex;">
        <div style="width:350px;color:#333;text-align:center;">重複禁止フィールド</div>
        <div class="head" style="width: 300px;color:#333;text-align:center;">AND/OR</div>
      </div>

      <div class="main-contents">
        <div style="display: flex;">
          <div class="tip-container">
            <select class="dup-field select2">
              <!-- <option value="none"></option> -->
            </select>
          </div>
          <div class="tip-container1"; style="position: absolute;left: 370px;">
            <select id="condition" class="condition select2">            
              <option value="none"></option>
              <option value="OR">OR</option>
              <option value="AND">AND</option>
            </select>
          </div>

          <!-- 追加・削除ボタン -->
          <!-- <div class="check-contents"> -->
            <div class="kintoneplugin-table-td-operation"
              style="position: absolute; left:660px;">
              <button type="button" class="kintoneplugin-button-add-row-image add-row" title="Add row"></button>
              <button type="button" class="kintoneplugin-button-remove-row-image remove-row"
                title="Delete this row"></button>
            </div>
          <!-- </div> -->
        </div>
      </div>
    </div>

    <p class="kintoneplugin-row">
      <button type="button" class="js-cancel-button kintoneplugin-button-dialog-cancel">キャンセル</button>
      <button id="submit" class="kintoneplugin-button-dialog-ok">保存</button>
    </p>
  </form>
</section>
