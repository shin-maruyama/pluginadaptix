<section class="settings">
  <form class="js-submit-settings">

    <div id="parent">
      <p style="color:#333;font-weight: bold;">計算対象設定</p>
      <div class="main-contents" style="display: flex;">

        <div class="left-colunm">
          <p style="color:#333;">開始日フィールド</p>
          <div class="tip-container">
          <select class="start-date select2">
            <!-- <option></option> -->
          </select>
          </div>

          <p style="margin-top: 10px;color:#333;">終了日フィールド</p>
          <div class="tip-container">
          <select class="end-date select2">
            <!-- <option></option> -->
          </select>
          </div>

          <p style="margin-top: 10px;color:#333;">時間格納フィールド</p>
          <div class="tip-container">
            <select class="result-value select2">
            <!-- <option></option> -->
          </select>
          </div>
        </div>

        <!-- <div style="margin:20px 0 0  200px;"> -->
        <div class="check-contents">
          <p style="margin-bottom: -3px;color:#333;">休日設定</p>
          <div style="display: flex; border: solid lightgray 1px;width: 300px;">
            <input type="checkbox" class="monday-check checkll">
            <p style="color:#333;">月</p>
            <input type="checkbox" class="tuesday-check checkll">
            <p style="color:#333;">火</p>
            <input type="checkbox" class="wednesday-check checkll">
            <p style="color:#333;">水</p>
            <input type="checkbox" class="thursday-check checkll">
            <p style="color:#333;">木</p>
            <input type="checkbox" class="friday-check checkll">
            <p style="color:#333;">金</p>
            <input type="checkbox" class="saturday-check checkll">
            <p style="color:#333;">土</p>
            <input type="checkbox" class="sunday-check checkll">
            <p style="color:#333;">日</p>
          </div>
          <div style="margin-top: 20px;">
            <p style="margin-bottom: -3px;color:#333;">国民の休日</p>
            <div style="display: flex;  border: solid lightgray 1px;width: 150px;">
              <input type="checkbox" class="holiday-check" style="margin-left: 10px;">
              <p style="color:#333;">対象外とする</p>
            </div>
          </div>
        </div>

        <!-- 追加・削除ボタン -->
        <!-- <div class="kintoneplugin-table-td-operation" style="margin-left: -15px;">
          <button type="button" class="kintoneplugin-button-add-row-image add-row" title="Add row"></button>
          <button type="button" class="kintoneplugin-button-remove-row-image remove-row" title="Delete this row"></button>
        </div> -->

      </div>
    </div>
    <div class="time-area">
      <p style="font-weight: bold;color:#333;">計算除外時間設定</p>
      <div style="display: flex;">
        <p style="color:#333;">除外時間開始</p>
        <p style="margin-left: 115px;color:#333;">除外時間終了(24:00は0:00)</p>
      </div>
      <div class="time-select" style="display: flex;margin-bottom: 10px;">
        <input type="time" class="start-time">
        <p style="margin-left: 20px; font-size: large;">~</p>
        <input type="time" class="end-time">
        <div class="kintoneplugin-table-td-operation" style="margin-top: 10px;">
          <button type="button" class="kintoneplugin-button-add-row-image add-field" title="Add row"></button>
          <button type="button" class="kintoneplugin-button-remove-row-image remove-field"
            title="Delete this row"></button>
        </div>

      </div>
    </div>


    <p class="kintoneplugin-row">
      <button type="button" class="js-cancel-button kintoneplugin-button-dialog-cancel">キャンセル</button>
      <button id="submit" class="kintoneplugin-button-dialog-ok">保存</button>
    </p>
  </form>
</section>
