<section class="settings">
  <form class="js-submit-settings">

    <div id="parent">
      <div class="main-contents">

        <p style="color:#333;margin-top: 10px;">計算開始時刻フィールド<span style="color: red;">※</span></p>
        <div class="tip-container">
        <select class="start-time-select select2">
          <!-- <option value="none"></option> -->
        </select>
        </div>

        <p style="color:#333;margin-top: 10px;">計算終了時刻フィールド<span style="color: red;">※</span></p>
        <div class="tip-container">
        <select class="end-time-select select2">
          <!-- <option value="none"></option> -->
        </select>
        </div>

        <p style="color:#333;margin-top: 10px;">計算結果時刻フィールド</p>
        <div class="tip-container">
        <select class="answer-time-select select2">
          <!-- <option value="none"></option> -->
        </select>
        </div>

        <p style="color:#333;margin-top: 10px;">結果（時間）数値フィールド</p>
        <div class="tip-container">
        <select class="hour-select select2">
          <!-- <option value="none"></option> -->
        </select>
        </div>

        <p style="color:#333;margin-top: 10px;">結果（分）数値フィールド</p>
        <div class="tip-container">
        <select class="minute-select select2">
          <!-- <option value="none"></option> -->
        </select>
        </div>

        <!-- 追加・削除ボタン -->
        <div class="kintoneplugin-table-td-operation" style="margin: 0 0 10px -10px;">
          <button type="button" class="kintoneplugin-button-add-row-image add-row" title="Add row"></button>
          <button type="button" class="kintoneplugin-button-remove-row-image remove-row" title="Delete this row"></button>
        </div>

      </div>
    </div>

    <p class="kintoneplugin-row">
        <button type="button" class="js-cancel-button kintoneplugin-button-dialog-cancel">キャンセル</button>
        <button id="submit" class="kintoneplugin-button-dialog-ok">保存</button>
    </p>
  </form>
</section>
