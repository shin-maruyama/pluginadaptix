<section class="settings">
  <form class="js-submit-settings">
    <div id="parent">
      <div class="main-contents">
        <p style="color:#333;margin-top: 10px;">手書きサインを表示するスペース</p>
          <div class="tip-container">
            <select class="space-select select2">
              <!-- <option value="none"></option> -->
            </select>
          </div>
        <p style="color:#333;margin-top: 10px;">サインを保存する添付ファイル</p>
          <div class="tip-container">
            <select  class="file-select select2">
              <!-- <option value="none"></option> -->
            </select>
          </div>
        <p style="color:#333;margin-top: 10px;">サインをした日時を格納するフィールド</p>
          <div class="tip-container">
            <select class="date-select select2">
              <!-- <option value="none"></option> -->
            </select>
          </div>
        <div class="kintoneplugin-table-td-operation" style="margin-left: -10px;">
          <button type="button" class="kintoneplugin-button-add-row-image add-row" title="Add row"></button>
          <button type="button" class="kintoneplugin-button-remove-row-image remove-row"
            title="Delete this row"></button>
        </div>

      </div>
    </div>

    <p class="kintoneplugin-row" style="margin-top: 10px;">
      <button type="button" class="js-cancel-button kintoneplugin-button-dialog-cancel">キャンセル</button>
      <button class="kintoneplugin-button-dialog-ok" id="submit">保存</button>
    </p>
  </form>
</section>
